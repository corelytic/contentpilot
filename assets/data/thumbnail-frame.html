<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContentPilot Thumbnail</title>
  <style>
    body{
      margin:0;
      width:80px;
      height:80px;
      overflow:hidden;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at top left, rgba(123,220,255,.26), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255,157,118,.22), transparent 28%),
        linear-gradient(155deg, #08101e 0%, #0d1630 46%, #0a1020 100%);
      font-family:Segoe UI,Tahoma,sans-serif;
    }
    .tile{
      width:62px;
      height:62px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(14,21,39,.9);
      box-shadow:0 16px 32px rgba(0,0,0,.28), 0 0 0 1px rgba(123,220,255,.08);
      position:relative;
      display:grid;
      place-items:center;
      overflow:hidden;
    }
    .tile::before{
      content:"";
      position:absolute;
      inset:-8px;
      border-radius:24px;
      background:
        radial-gradient(circle at 18% 18%, rgba(123,220,255,.22), transparent 42%),
        radial-gradient(circle at 78% 82%, rgba(255,157,118,.2), transparent 40%);
      filter:blur(6px);
      z-index:-1;
    }
    .pulse-ring{
      position:absolute;
      inset:10px;
      border-radius:16px;
      border:1px solid rgba(123,220,255,.16);
      box-shadow:inset 0 0 20px rgba(123,220,255,.05);
    }
    .glyph{
      width:34px;
      height:34px;
      border-radius:12px;
      background:linear-gradient(135deg,#7bdcff,#79a8ff 52%,#ff9d76);
      box-shadow:0 12px 24px rgba(121,168,255,.26);
      position:relative;
    }
    .glyph::before{
      content:"";
      position:absolute;
      left:7px;
      top:6px;
      width:12px;
      height:19px;
      border:4px solid #08101e;
      border-right-width:0;
      border-radius:7px 0 0 7px;
    }
    .glyph::after{
      content:"";
      position:absolute;
      right:6px;
      top:8px;
      width:10px;
      height:10px;
      border:4px solid #08101e;
      border-left-width:0;
      border-bottom-width:0;
    }
    .pulse-dot{
      position:absolute;
      right:10px;
      top:10px;
      width:8px;
      height:8px;
      border-radius:50%;
      background:#7bdcff;
      box-shadow:0 0 0 4px rgba(123,220,255,.12);
    }
  </style>
</head>
<body>
  <div class="tile">
    <div class="pulse-ring"></div>
    <div class="glyph"></div>
    <div class="pulse-dot"></div>
  </div>
</body>
</html>
